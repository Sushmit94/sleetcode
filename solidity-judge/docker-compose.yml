version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: soljudge
      POSTGRES_PASSWORD: soljudge
      POSTGRES_DB: soljudge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://soljudge:soljudge@postgres:5432/soljudge
      REDIS_URL: redis://redis:6379
      SANDBOX_IMAGE: solidity-sandbox
      PORT: 4000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # so API can spawn sandbox containers
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  pgdata: